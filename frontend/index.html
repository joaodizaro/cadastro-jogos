<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Jogos</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🎮 Cadastro de Jogos</h1>
</header>

<main>
  <section class="acoes">
    <button id="btnNovo">+ Novo Jogo</button>
  </section>

  <section class="lista-container">
    <table id="tabelaJogos">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Gênero</th>
          <th>Plataforma</th>
          <th>Ano</th>
          <th>Nota</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="corpoTabela">
        <!-- linhas geradas via JS -->
      </tbody>
    </table>
    <p id="mensagemVazia" style="display:none;">Nenhum jogo cadastrado ainda.</p>
  </section>
</main>

<!-- Modal de Cadastro/Edição -->
<div id="modal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h2 id="modalTitulo">Novo Jogo</h2>
    <form id="formJogo">
      <input type="hidden" id="jogoId">

      <label for="nome">Nome</label>
      <input type="text" id="nome" required>

      <label for="genero">Gênero</label>
      <input type="text" id="genero" required>

      <label for="plataforma">Plataforma</label>
      <input type="text" id="plataforma" required>

      <label for="ano">Ano de Lançamento</label>
      <input type="number" id="ano" required>

      <label for="nota">Nota (0 a 10)</label>
      <input type="number" id="nota" step="0.1" min="0" max="10">

      <div class="modal-botoes">
        <button type="button" id="btnCancelar">Cancelar</button>
        <button type="submit">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
