<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Jogo</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="3"/><line x1="6" y1="10" x2="6" y2="14"/><line x1="4" y1="12" x2="8" y2="12"/><circle cx="16" cy="10" r="1"/><circle cx="18" cy="13" r="1"/></svg>
      <span>GameVault</span>
    </div>
    <nav>
      <a href="index.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Lista de Jogos
      </a>
      <a href="cadastro.html" class="nav-link active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo Jogo
      </a>
      <a href="dashboard.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Dashboard
      </a>
      <a href="sobre.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        Sobre
      </a>
    </nav>
  </aside>

  <div class="conteudo">
    <header>
      <h1 id="tituloForm">Novo Jogo</h1>
    </header>

    <main>
      <section class="form-container">
        <form id="formJogo">
          <input type="hidden" id="jogoId">

          <label for="nome">Nome *</label>
          <input type="text" id="nome" required>

          <label for="genero">Gênero *</label>
          <input type="text" id="genero" required>

          <label for="plataforma">Plataforma *</label>
          <input type="text" id="plataforma" required>

          <label for="ano">Ano de Lançamento *</label>
          <input type="number" id="ano" required>

          <label for="nota">Nota (0 a 10)</label>
          <input type="number" id="nota" step="0.1" min="0" max="10">

          <label for="descricao">Descrição</label>
          <textarea id="descricao" rows="4"></textarea>

          <label for="imagem_url">URL da Imagem (capa)</label>
          <input type="url" id="imagem_url" placeholder="https://exemplo.com/imagem.jpg">

          <div class="form-botoes">
            <a href="index.html" class="btn btn-cancelar">Cancelar</a>
            <button type="submit" class="btn btn-salvar">Salvar</button>
          </div>
        </form>
      </section>
    </main>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
