<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Jogo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🎮 Cadastro de Jogos</h1>
</header>

<main>
  <section class="form-container">
    <h2 id="tituloForm">Novo Jogo</h2>
    <form id="formJogo">
      <input type="hidden" id="jogoId">

      <label for="nome">Nome *</label>
      <input type="text" id="nome" required>

      <label for="genero">Gênero *</label>
      <input type="text" id="genero" required>

      <label for="plataforma">Plataforma *</label>
      <input type="text" id="plataforma" required>

      <label for="ano">Ano de Lançamento *</label>
      <input type="number" id="ano" required>

      <label for="nota">Nota (0 a 10)</label>
      <input type="number" id="nota" step="0.1" min="0" max="10">

      <label for="descricao">Descrição</label>
      <textarea id="descricao" rows="4"></textarea>

      <label for="imagem_url">URL da Imagem (capa)</label>
      <input type="url" id="imagem_url" placeholder="https://exemplo.com/imagem.jpg">

      <div class="form-botoes">
        <a href="index.html" class="btn btn-cancelar">Cancelar</a>
        <button type="submit" class="btn btn-salvar">Salvar</button>
      </div>
    </form>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
